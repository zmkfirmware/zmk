# Optional/overridable tuning for the derivative dongle central.
# Role + peripheral count come from Kconfig.defconfig.

# Studio can run on the central (dongle) so the keymap stays editable over USB.
# CONFIG_ZMK_STUDIO=y

# Deliberately NOT enabling CONFIG_ZMK_LED_MAP: the dongle has no RGB strip.
# The keyboard peripheral keeps its own LEDs. Relaying keymap-driven LED changes
# from the dongle to the peripheral is future work (see README.md).
