CONFIG_SETTINGS=y
CONFIG_ZMK_SETTINGS_RESET_ON_START=y
# Disable BLE so splits don't try to re-pair until normal firmware is flashed.
CONFIG_ZMK_BLE=n
# Disable displays so status screens that rely on BLE do not fail the build.
CONFIG_ZMK_DISPLAY=n
# Disable features not needed for settings reset that may conflict with BLE being off.
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_LED_MAP=n
CONFIG_ZMK_HID_INDICATORS=n
CONFIG_ZMK_SLEEP=n
