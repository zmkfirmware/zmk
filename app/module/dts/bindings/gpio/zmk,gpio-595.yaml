description: >
  This is a representation of the 595 Shift Register.

compatible: "zmk,gpio-595"

include: [gpio-controller.yaml, spi-device.yaml]

properties:
  "#gpio-cells":
    const: 2

  ngpios:
    type: int
    required: true
    enum:
      - 8
      - 16
      - 24
      - 32
      - 40
      - 48
      - 56
      - 64
    description: Number of gpios supported (up to 8 daisy-chained shift registers)

gpio-cells:
  - pin
  - flags
